<!DOCTYPE html>
<html>

<head>

<title>Results</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">

<style>

.loading-box{

text-align:center;
padding:40px 15px;

}

.loading-title{

font-size:28px;
font-weight:600;
margin-bottom:10px;

background: linear-gradient(90deg,#00e5ff,#6c63ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.loading-sub{

opacity:.7;
margin-bottom:25px;

}

.loader{

border:4px solid #1b2555;
border-top:4px solid #00e5ff;

border-radius:50%;

width:45px;
height:45px;

animation:spin 1s linear infinite;

margin:auto;

}

@keyframes spin{

0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}

}

</style>

</head>



<body>


<div class="navbar">

<div class="nav-left">

Results

</div>

<div class="nav-right">

<a href="/">Home</a>

</div>

</div>



<div class="container">

<img src="/static/logo.png" class="logo">


<div class="loading-box">

<div class="loading-title">

Results Loading...

</div>

<div class="loading-sub">

Final evaluation is in progress

</div>


<div class="loader"></div>

</div>


</div>



</body>

</html>
